<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lenguas – Privacy Policy</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 720px;
      margin: 48px auto;
      padding: 0 24px 64px;
      color: #1a1a1a;
      line-height: 1.7;
    }
    h1 { font-size: 1.8rem; margin-bottom: 4px; }
    h2 { margin-top: 2rem; }
    h3 { margin-top: 1.5rem; }
    a { color: #0070f3; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    hr { border: none; border-top: 1px solid #e5e5e5; margin: 2rem 0; }
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #e5e5e5; }
      code { background: #222; }
      hr { border-color: #333; }
    }
  </style>
</head>
<body>
  <div id="content">Loading…</div>
  <script>
    fetch("PRIVACY_POLICY.md")
      .then(r => r.text())
      .then(md => { document.getElementById("content").innerHTML = marked.parse(md); })
      .catch(() => { document.getElementById("content").textContent = "Failed to load privacy policy."; });
  </script>
</body>
</html>
